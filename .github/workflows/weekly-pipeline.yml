name: Weekly RA Pipeline

on:
  schedule:
    - cron: '0 0 * * 1'  # Monday 1:00 UTC (= 2:00 CET winter, 3:00 CEST summer)
  workflow_dispatch:     # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm install

      - name: Install Playwright browsers
        run: playwright install

      - name: Fetch latest episode ID
        id: latest
        run: |
          EPISODE_ID=$(python scripts/get_latest_episode_id.py)
          echo "episode_id=$EPISODE_ID" >> $GITHUB_OUTPUT
          echo "Latest episode: $EPISODE_ID"

      - name: Fetch latest mix data
        run: |
          python scripts/fetch_missing_httpx.py --ids ${{ steps.latest.outputs.episode_id }} || echo "Fetch attempt completed"

      - name: Parse and extract genres
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          python run_pilot.py --ids ${{ steps.latest.outputs.episode_id }}
          python scripts/llm_genre_extract.py || echo "LLM extraction skipped, continuing with regex genres..."

      - name: Normalize labels and genres
        run: |
          python scripts/normalize_labels.py
          python normalize/genre_normalizer.py
          python python/consolidated_exporter.py

      - name: Build HTML visualization
        run: python scripts/build_network_html.py

      - name: Sync index.html
        run: cp ra_genre_network.html index.html

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          git add index.html ra_genre_network.html
          COMMIT_MSG="build: Weekly pipeline update ($(date '+%Y-%m-%d'))"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "$COMMIT_MSG"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Report on failure
        if: failure()
        run: |
          echo "Pipeline failed. Check logs at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
